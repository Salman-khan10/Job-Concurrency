name: Deploy next JS App

on: 
  push:   
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
      - name: install depencies
        run: npm install
      - name: build next.js app
        run: npm run build
      - name: deploy
        run: echo "deploying app...."
      - name: deploy
        run: echo "deploying app...." 
